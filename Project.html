<!DOCTYPE html>
<html>
<head>
<title>Campus Match</title>

<style>
body{
  font-family: Arial;
  margin:0;
  overflow:hidden;
  background: linear-gradient(135deg,#ff3c6f,#ff7a9a,#ffb3c6);
  height:100vh;
  transition: background 0.5s, color 0.5s;
  color:black;
}

/* dark mode */
body.dark{
  background: linear-gradient(135deg,#1a1a1a,#333,#444);
  color:white;
}

/* toggle button - top-right corner, small */
#toggleMode{
  position: absolute;
  top: 10px;
  right: 10px;       /* top-right */
  background: #fff;
  color: #ff2e63;
  border: none;
  padding: 6px 10px; /* smaller button */
  border-radius: 50%; /* circular */
  cursor: pointer;
  z-index: 999;
  font-weight: bold;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
}

body.dark #toggleMode{
  background: #ff2e63;
  color: white;
}

/* floating hearts */
.heart{
  position:absolute;
  font-size:22px;
  color:white;
  opacity:0.8;
  animation:float 8s linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh) scale(0.5); opacity:0;}
  30%{opacity:1;}
  100%{transform:translateY(-10vh) scale(1.3); opacity:0;}
}

/* twinkling sparkles */
.sparkle{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  animation:twinkle 3s infinite;
}
@keyframes twinkle{
  0%,100%{opacity:0.2; transform:scale(1);}
  50%{opacity:1; transform:scale(1.8);}
}

/* glowing pulse behind content */
body::before{
  content:"";
  position:absolute;
  width:800px;
  height:800px;
  background:radial-gradient(circle,#ff4d6d,transparent);
  filter:blur(120px);
  animation:pulse 6s infinite;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:-1;
}

body.dark::before{
  background:radial-gradient(circle,#ff69b4,transparent);
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.3);}
  100%{transform:translate(-50%,-50%) scale(1);}
}

/* page layout */
.page{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  z-index:1;
  position:relative;
}

/* boxes */
.box{
  background:rgba(255,255,255,0.9);
  padding:30px;
  border-radius:12px;
  width:320px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  backdrop-filter:blur(6px);
  z-index:2;
  transition: background 0.5s, color 0.5s;
}

body.dark .box{
  background:rgba(30,30,30,0.9);
  color:white;
}

input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
  transition: background 0.5s, color 0.5s;
}

body.dark input, body.dark select{
  background:#222;
  color:white;
  border:1px solid #555;
}

button{
  width:100%;
  padding:10px;
  background:#ff2e63;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:15px;
  transition: background 0.5s, color 0.5s;
}

button:hover{
  background:#d61b52;
}

/* home page */
#homePage{
  display:none;
  flex-direction:column;
  padding-top:60px;
}

.navbar{
  background:#ff2e63;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  width:100%;
  position:absolute;
  top:0;
}

body.dark .navbar{
  background:#222;
  color:white;
}

.container{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:60px;
}

.card{
  background:white;
  width:220px;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
  text-align:center;
  transition: background 0.5s, color 0.5s;
}

body.dark .card{
  background:#333;
  color:white;
}

.card img{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:10px;
}

.match{
  background:#ff2e63;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<!-- DARK/LIGHT MODE BUTTON -->
<button id="toggleMode" onclick="toggleMode()">🌙</button>

<!-- floating hearts -->
<div class="heart" style="left:5%">❤</div>
<div class="heart" style="left:20%; animation-delay:2s;">❤</div>
<div class="heart" style="left:35%; animation-delay:4s;">❤</div>
<div class="heart" style="left:50%; animation-delay:1s;">❤</div>
<div class="heart" style="left:65%; animation-delay:3s;">❤</div>
<div class="heart" style="left:80%; animation-delay:5s;">❤</div>

<!-- twinkling sparkles -->
<div class="sparkle" style="top:20%; left:15%"></div>
<div class="sparkle" style="top:30%; left:70%"></div>
<div class="sparkle" style="top:60%; left:25%"></div>
<div class="sparkle" style="top:80%; left:80%"></div>
<div class="sparkle" style="top:50%; left:50%"></div>

<!-- LOGIN PAGE -->
<div class="page" id="loginPage">
  <div class="box">
    <h2>Campus Match ❤️</h2>
    <input type="text" id="universityId" placeholder="University ID" required>
    <select id="field" required>
      <option value="">Select Field</option>
      <option>Computer Science</option>
      <option>Information Systems</option>
      <option>Medical</option>
      <option>Management</option>
      <option>Arts</option>
    </select>
    <button onclick="showProfile()">Login</button>
  </div>
</div>

<!-- PROFILE SETUP PAGE -->
<div class="page" id="profilePage" style="display:none;">
  <div class="box">
    <h2>Create Profile</h2>
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="number" id="age" placeholder="Your Age" required>
    <input type="file" id="photo" required>
    <button onclick="createProfile()">Continue</button>
  </div>
</div>

<!-- HOME PAGE -->
<div class="page" id="homePage">
  <div class="navbar">
    <h3>Campus Match ❤️</h3>
    <button onclick="logout()">Logout</button>
  </div>
  <div class="container">
    <!-- user profile -->
    <div class="card">
      <img id="profileImage">
      <h3 id="profileName"></h3>
      <p id="profileAge"></p>
    </div>
    <!-- sample matches -->
    <div class="card">
      <img src="https://i.pravatar.cc/100?img=5">
      <h3>Sara</h3>
      <p>Medical</p>
      <button class="match">Connect</button>
    </div>
    <div class="card">
      <img src="https://i.pravatar.cc/100?img=12">
      <h3>Nimal</h3>
      <p>Computer Science</p>
      <button class="match">Connect</button>
    </div>
    <div class="card">
      <img src="https://i.pravatar.cc/100?img=9">
      <h3>Ashani</h3>
      <p>Arts</p>
      <button class="match">Connect</button>
    </div>
  </div>
</div>

<script>
function toggleMode(){
  document.body.classList.toggle("dark");
}

function showProfile(){
  let uni=document.getElementById("universityId").value.trim();
  let field=document.getElementById("field").value;

  if(uni=="" || field==""){
    alert("University ID and Field are required!");
    return;
  }

  document.getElementById("loginPage").style.display="none";
  document.getElementById("profilePage").style.display="flex";
}

function createProfile(){
  let name=document.getElementById("name").value.trim();
  let age=document.getElementById("age").value.trim();
  let photo=document.getElementById("photo").files[0];

  if(name=="" || age=="" || !photo){
    alert("Name, Age, and Profile Picture are required!");
    return;
  }

  document.getElementById("profileName").innerText=name;
  document.getElementById("profileAge").innerText="Age: "+age;

  let reader=new FileReader();
  reader.onload=function(e){
    document.getElementById("profileImage").src=e.target.result;
  }
  reader.readAsDataURL(photo);

  document.getElementById("profilePage").style.display="none";
  document.getElementById("homePage").style.display="flex";
}

function logout(){
  document.getElementById("homePage").style.display="none";
  document.getElementById("loginPage").style.display="flex";
}
</script>

</body>
</html>
