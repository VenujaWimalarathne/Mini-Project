<!DOCTYPE html>
<html lang="en">
<head>
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Match</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Animated Watermark -->
<div class="watermark">Campus Match</div>

<!-- Dark/Light Toggle -->
<button id="modeToggle">🌙 Dark</button>

<div class="heart" style="left:15%; animation-delay: 0s;"></div>
<div class="heart" style="left:35%; animation-delay: 2s;"></div>
<div class="heart" style="left:55%; animation-delay: 4s;"></div>
<div class="heart" style="left:75%; animation-delay: 6s;"></div>

<!-- LOGIN -->
<div id="loginPage" class="container active">
<h2>Login</h2>
<input id="loginID" placeholder="User Id">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p>No account? <a onclick="showPage('signupPage')" style="cursor:pointer">Signup</a></p>
</div>

<!-- SIGNUP -->
<div id="signupPage" class="container">
<h2 style="text-align:center">Signup</h2>
<input id="name" placeholder="Full Name">
<input id="age" placeholder="Age">
<select id="gender"><option>Male</option><option>Female</option></select>
<select id="pref"><option>Male</option><option>Female</option><option>Any</option></select>
<input id="faculty" placeholder="Faculty (e.g. Computer Science)">
<input id="year" placeholder="Year">
<input id="studentID" placeholder="Student ID">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Signup</button>
</div>

<!-- PROFILE -->
<div id="profilePage" class="container">
<h2 style="text-align:center">Profile Setup</h2>
<textarea id="bio" placeholder="Short bio"></textarea>
<label>Take Photo:</label>
<video id="camera" width="100%" autoplay style="border-radius: 15px; margin-bottom: 10px; display:none;"></video>
<canvas id="canvas" style="display:none"></canvas>
<button onclick="startCamera()">Open Camera</button>
<button onclick="takePhoto()">Take Photo</button>
<label style="text-align:center; display:block; margin-top:10px;">OR Upload Image (Max 2MB)</label>
<input type="file" id="upload" onchange="checkFileSize()">
<img id="preview" class="preview" alt="Image Preview" style="display:none; width:100%; border-radius:15px; margin-top:10px;">

<label style="text-align:center; display:block; margin-top:10px;">Interests:</label>
<div class="interests-grid">
  <label><input type="checkbox" value="Music"> Music</label>
  <label><input type="checkbox" value="Sports"> Sports</label>
  <label><input type="checkbox" value="Coding"> Coding</label>
  <label><input type="checkbox" value="Movies"> Movies</label>
  <label><input type="checkbox" value="Art"> Art</label>
  <label><input type="checkbox" value="Travel"> Travel</label>
  <label><input type="checkbox" value="Photography"> Photography</label>
  <label><input type="checkbox" value="Gaming"> Gaming</label>
  <label><input type="checkbox" value="Food"> Food</label>
  <label><input type="checkbox" value="Fitness"> Fitness</label>
  <label><input type="checkbox" value="Reading"> Reading</label>
  <label><input type="checkbox" value="Dancing"> Dancing</label>
</div>
<input id="insta" placeholder="Instagram">
<button onclick="saveProfile()">Save Profile</button>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="container">
<h2 style="text-align:center">Welcome <span id="userName"></span></h2>
<button onclick="startSwipe()">Discover People</button>
<button onclick="showMatches()">Find Matches</button>
<button onclick="showPage('profilePage')">Edit Profile</button>
<button onclick="logout()">Logout</button>
</div>

<!-- SWIPE -->
<div id="swipePage" class="container">
<h2 style="text-align:center">Discover People</h2>
<div id="swipeCard"></div>
<button onclick="likeUser()">❤️ Like</button>
<button onclick="passUser()">❌ Pass</button>
<button onclick="showPage('dashboardPage')">Back</button>
</div>

<!-- MATCHES -->
<div id="matchPage" class="container">
<h2 style="text-align:center">Matches</h2>
<div id="matchList"></div>
<button onclick="showPage('dashboardPage')">Back</button>
</div>

<!-- CHAT -->
<div id="chatPage" class="container">
<div class="chat-header">
  <h2 id="chatPartnerName" style="text-align:center; margin: 0; flex-grow: 1;">Chat</h2>
  <div id="callButtons"></div>
</div>
<div id="chatBox" style="height:200px;overflow:auto;border:1px solid #ccc;padding:10px"></div>
<div id="typingIndicator" style="display: none;"></div>
<input id="chatInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
<button onclick="showPage('matchPage')">Back</button>
</div>

<!-- CALL OVERLAY -->
<div id="callOverlay">
    <div class="call-container">
        <img id="callPartnerAvatar" src="" alt="Avatar">
        <h3 id="callStatus">Calling...</h3>
        <p id="callPartnerNameOverlay"></p>
        <button id="hangUpButton" onclick="hangUp()">Hang Up</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
